<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz Cumple</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffd6e7;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .pantalla {
      position: absolute;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
    }

    #p1 { display: flex; }
    #p2, #p3 { background: #ffd6e7; }

    .contenedor {
      position: relative;
      width: 1000px;
      height: 1000px;
      top: 40px;
    }

    .texto {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #333;
      font-size: 32px;
      font-weight: bold;
      width: 400px;
    }

    .corazon { color: red; }

    img.hex {
      position: absolute;
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 30px;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }

    .img1 { top: 40px; left: 50%; transform: translateX(-50%); }
    .img2 { top: 25%; left: 5%; }
    .img3 { top: 25%; right: 5%; }
    .img4 { bottom: 25%; left: 5%; }
    .img5 { bottom: 25%; right: 5%; }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      z-index: 2;
    }

    .final-img {
      max-width: 80vw;
      max-height: 80vh;
      object-fit: contain;
      border: 10px solid white;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 2s ease;
      z-index: 2;
    }

    .mostrar { opacity: 1; }

    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 18px;
      color: #ff4d88;
      animation: subir linear infinite;
      opacity: 0.7;
      pointer-events: none;
    }

    @keyframes subir {
      0% { transform: translateY(0) scale(1); opacity: 0.7; }
      100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>

<body>

<!-- AUDIOS -->
<audio id="audio1" loop>
  <source src="20.mp3" type="audio/mpeg">
</audio>

<audio id="audio2" loop>
  <source src="10.mp3" type="audio/mpeg">
</audio>

<!-- PANTALLA 1 -->
<div class="pantalla" id="p1">
  <div class="contenedor">
    <div class="texto">
      Feliz cumple, te amo cada dia <span class="corazon">♥</span>
    </div>

    <img src="2.jpg" class="hex img1">
    <img src="3.jpg" class="hex img2">
    <img src="4.jpg" class="hex img3">
    <img src="5.jpg" class="hex img4">
    <img src="6.jpg" class="hex img5">
  </div>
</div>

<!-- PANTALLA 2 -->
<div class="pantalla" id="p2">
  <video id="video" src="1.mp4" controls></video>
</div>

<!-- PANTALLA 3 -->
<div class="pantalla" id="p3">
  <img id="imagenFinal" src="bol.jpg" class="final-img">
</div>

<script>
  const audio1 = document.getElementById("audio1");
  const audio2 = document.getElementById("audio2");
  const p1 = document.getElementById("p1");
  const p2 = document.getElementById("p2");
  const p3 = document.getElementById("p3");
  const video = document.getElementById("video");
  const imgFinal = document.getElementById("imagenFinal");

  let clicks = 0;

  document.body.addEventListener("click", () => {
    clicks++;

    if (clicks === 1) {
      audio1.play();
    }

    else if (clicks === 2) {
      audio1.pause();
      audio1.currentTime = 0;

      p1.style.display = "none";
      p2.style.display = "flex";

      video.play();
    }

    else if (clicks === 3) {
      // 🔇 MATAR COMPLETAMENTE EL VIDEO (audio incluido)
      video.pause();
      video.muted = true;
      video.currentTime = 0;
      video.removeAttribute("src");
      video.load();

      // cambiar pantalla
      p2.style.display = "none";
      p3.style.display = "flex";

      // 🎵 AUDIO INMEDIATO
      audio2.currentTime = 0;
      audio2.play();

      // mostrar imagen con delay
      setTimeout(() => {
        imgFinal.classList.add("mostrar");
      }, 2000);
    }
  });

  // 💗 corazones
  for (let i = 0; i < 100; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "♥";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 30) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    heart.style.animationDelay = Math.random() * 5 + "s";

    document.body.appendChild(heart);
  }
</script>

</body>
</html>
